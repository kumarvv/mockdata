target:
  type: db|sql|json
  db_conn_str: db://...
  dbUsername: blah
  dbPassword: blah

tables:
  - name: <table_name>
    method: append|merge
    columns:
      - id: sql|<sql statment returning a value>
      - uuid: uuid
      - name: random_name
      - description: random_string|<length>[|<length-max>]
      - address: random_address|<country>
      - street: random_street
      - city: random_city|<country>
      - state: random_state|<country>
      - country: random_country
      - user_type: random_in|admin,normal,viewer
      - department_id: random_from|departments,id
      - tags: random_multiple
      - is_active: true
      - created_at: random_date
