target:
  type: sql
  db_type: mysql|postgres|sqlite
  db_conn_str: db://...
  to_path: <path>

tables:
  - name: users
    mode: append
    columns:
      - id: sql|<sql statement returning a value>
      - uuid: uuid
      - first_name: random_first_name|male
      - last_name: random_last_name|male
      - gender: random_gender
      - email: random_email
      - description: random_string|<min-length>[,<max-length>]
      - address: random_address|US
      - street: random_street|US
      - city: random_city|US
      - state: random_state|US
      - country: random_country2
      - user_type: random_in|admin,normal,viewer
      - department_id: random_from|departments,id
      - source: string|generated
      - is_active: boolean|true
      - created_at: random_date
