target:
  type: sql
  to_path: /Users/kumarvv/dev/temp

tables:
  - name: tags
    mode: append
    row_count: 1000
    columns:
      - uuid: uuid()
      - username: random_string(len=25, case=upper)
      - full_name: random_full_name(gender=male, case=upper)
      - email: random_email()
      - created_at: random_date()
      - sys_key: string(ABCD)
      - is_active: boolean(true)
      - version: integer(1)
