target:
  type: sql
  to_path: /Users/kumarvv/dev/temp

tables:
  - name: tags
    mode: append
    row_count: 10
    columns:
      - name: id
        type: serial
        min: 1001
      - name: key
        type: uuid
      - name: username
        type: random_string
        min: 25
        max: 25
        case: upper
      - name: full_name
        type: random_full_name
      - name: description
        type: random_paragraph
        max: 50
      - name: is_active
        type: boolean
        value: true
  - name: tasks
    mode: append
    row_count: 10
    columns:
      - name: id
        type: serial
        min: 2001
      - name: name
        type: random_string
        min: 10
        case: lower
      - name: tag_id
        type: random_range
        min: 1001
        max: 1010
